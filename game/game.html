<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="global_13.css?v=12">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>BitFlip - Game</title>
</head>
<body>
    <div class="page">
        <main class="game-container">
            <section class="definition-section">
                <div class="def-header">DEFINITION</div>
                <div id="definition-text" class="def-content">
                    <div class="def-text">Flip the cards to get the highest score!</div>
                </div>
                <div class="def-footer">
                    <button class="restart-btn" onclick="location.reload()">RESTART GAME</button>
                    <button class="home-btn" onclick="location.href='../index.html'">HOME</button>
                </div>
            </section>

            <section class="game-section">
                <div class="game-info-bar">
                    <div class="stat-box"><span>LVL: </span><span id="level">1</span></div>
                    <div class="stat-box"><span>TIME LEFT: </span><span id="timer" class="timer-display">00:30</span></div>
                    <div class="stat-box"><span>MODE: </span><span id="game-mode">--</span></div>
                    <div class="stat-box"><span>DIFFICULTY: </span><span id="game-difficulty">--</span></div>
                    <div class="stat-box score-box"><span>SCORE: </span><span id="score">0</span></div>
                </div>

                <div class="board">
                    <div id="card-grid" class="card-grid"></div>
                </div>
            </section>
        </main>

        <div class="gameover-backdrop" id="gameover-backdrop" hidden></div>
        <div class="gameover-modal" id="gameover-modal" hidden>
            <div class="gameover-card">
                <div class="gameover-head">
                    <h2 class="gameover-title">GAME OVER</h2>
                </div>
                <p class="gameover-subtitle">Your score</p>
                <div class="gameover-score" id="gameover-score">0</div>
                <div class="gameover-message" id="gameover-message" style="display: none;"></div>
                <div class="gameover-actions">
                    <button class="buttons" type="button" id="gameover-restart">RESTART</button>
                    <button class="buttons" type="button" onclick="location.href='../index.html'">HOME</button>
                </div>
            </div>
        </div>

        <div class="example-popup-backdrop hidden" id="example-backdrop"></div>
        <div class="example-popup hidden" id="example-popup">
            <div class="example-popup-label">Example</div>
            <div class="example-popup-code" id="example-code"></div>
        </div>

    <script src="game1.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode');
        const gameDifficulty = urlParams.get('difficulty');

        if (gameMode) {
            const modeDisplay = gameMode === 'datatypes' ? 'Data Types' : 
                              gameMode === 'vb' ? 'Visual Basic' : gameMode;
            document.getElementById('game-mode').textContent = modeDisplay;
        }

        if (gameDifficulty) {
            const diffDisplay = gameDifficulty.charAt(0).toUpperCase() + gameDifficulty.slice(1);
            document.getElementById('game-difficulty').textContent = diffDisplay;
        }

        const htmlElement = document.documentElement;
        const STORAGE_KEY = 'user-theme';

        function setTheme(themeName) {
            htmlElement.setAttribute('data-theme', themeName);
            localStorage.setItem(STORAGE_KEY, themeName);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem(STORAGE_KEY);
            if (savedTheme) {
                setTheme(savedTheme);
            }
        });
    </script>
</body>
</html>
